<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #0E0E0F;
    --surface: #161618;
    --border: #252528;
    --paper: #E2DDD5;
    --muted: #5A5A62;
    --signal: #3B82F6;
    --reel: #F5A623;
    --error: #E03535;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--paper);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(255,255,255,.012) 3px,
      rgba(255,255,255,.012) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(14,14,15,.88);
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--paper);
    text-decoration: none;
    letter-spacing: -.01em;
  }
  .nav-logo span { color: var(--signal); }

  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: .04em;
    transition: color .2s;
  }
  .nav-links a:hover { color: var(--paper); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 40px 80px;
    position: relative;
  }

  /* grid bg */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.06) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .hero-pre {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--signal);
    letter-spacing: .16em;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeup .6s .1s forwards;
  }

  .hero-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeup .6s .2s forwards;
    position: relative;
    z-index: 1;
  }

  .hero-title {
    font-family: var(--mono);
    font-size: clamp(40px, 8vw, 88px);
    font-weight: 700;
    line-height: .95;
    letter-spacing: -.03em;
    color: var(--paper);
    opacity: 0;
    animation: fadeup .6s .3s forwards glitch-loop;
    position: relative;
    z-index: 1;
  }
  .hero-title span { color: var(--signal); }

  .hero-sub {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    letter-spacing: .08em;
    margin-top: 18px;
    opacity: 0;
    animation: fadeup .6s .5s forwards;
    position: relative;
    z-index: 1;
  }

  .cursor {
    display: inline-block;
    color: var(--signal);
    animation: blink 1.1s step-end infinite;
  }

  .hero-cta {
    margin-top: 44px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    opacity: 0;
    animation: fadeup .6s .65s forwards;
    position: relative;
    z-index: 1;
  }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 12px 24px;
    border-radius: 6px;
    text-decoration: none;
    transition: opacity .2s, transform .15s;
    cursor: pointer;
    border: none;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn-primary { background: var(--signal); color: #fff; }
  .btn-ghost { background: transparent; color: var(--paper); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--muted); }

  /* ── SECTION BASE ── */
  section { padding: 96px 40px; max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .14em;
    color: var(--signal);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h2 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 500;
    letter-spacing: -.02em;
    line-height: 1.1;
    margin-bottom: 48px;
  }

  /* ── DIVISIONS ── */
  .divisions { padding-top: 0; }
  .div-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .div-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    transition: border-color .2s, transform .2s;
    text-decoration: none;
    display: block;
  }
  .div-card:hover { border-color: var(--muted); transform: translateY(-2px); }
  .div-card.games { border-color: rgba(245,166,35,.18); }
  .div-card.games:hover { border-color: rgba(245,166,35,.5); }

  .div-icon {
    width: 48px; height: 48px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  .div-icon.main { border: 2px solid var(--signal); }
  .div-icon.games { border: 2px solid var(--reel); }

  .div-name {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--paper);
    margin-bottom: 6px;
  }
  .div-name .dim { color: var(--muted); }
  .div-name .hi { color: var(--reel); }
  .div-name .hib { color: var(--signal); }

  .div-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .06em;
    margin-bottom: 18px;
  }

  .div-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* ── ABOUT ── */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
  .about-body { font-size: 16px; color: var(--paper); line-height: 1.8; }
  .about-body p + p { margin-top: 16px; }
  .about-body strong { color: var(--signal); font-weight: 500; }

  .about-stats { display: flex; flex-direction: column; gap: 16px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stat-label { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .stat-val { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--paper); }

  /* ── CONTACT ── */
  .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .contact-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-decoration: none;
    transition: border-color .2s;
    display: block;
  }
  .contact-card:hover { border-color: var(--signal); }
  .contact-type { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
  .contact-val { font-family: var(--mono); font-size: 13px; color: var(--paper); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 100%;
  }
  .footer-logo { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--muted); }
  .footer-logo span { color: var(--signal); }
  .footer-note { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .footer-flag { font-size: 18px; }

  /* ── TERMINAL BLOCK ── */
  .terminal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 48px;
  }
  .terminal-bar {
    background: var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 7px;
    align-items: center;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: var(--error); }
  .dot.y { background: var(--reel); }
  .dot.g { background: #30D158; }
  .terminal-body { padding: 20px 24px; font-family: var(--mono); font-size: 13px; line-height: 2; }
  .t-prompt { color: var(--signal); }
  .t-cmd { color: var(--paper); }
  .t-out { color: var(--muted); }
  .t-accent { color: var(--reel); }

  /* ── ANIMATIONS ── */
  @keyframes fadeup {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes glitch-loop {
    0%,84%,100% { text-shadow: none; }
    86% { text-shadow: -3px 0 var(--error), 3px 0 var(--signal); }
    88% { text-shadow:  3px 0 var(--error), -3px 0 var(--signal); }
    90% { text-shadow: none; }
    92% { text-shadow: -1px 0 var(--signal); }
    94% { text-shadow: none; }
  }

  @media (max-width: 700px) {
    nav { padding: 14px 20px; }
    .nav-links { display: none; }
    .hero { padding: 100px 24px 60px; }
    .div-grid, .about-grid, .contact-grid { grid-template-columns: 1fr; }
    section { padding: 64px 24px; }
    footer { flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
